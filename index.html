      align-items: center;
      min-height: 100vh;

    .container {

      display: inline-block;
      padding: 14px 30px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      margin: 10px;
      background: #5865f2;
      color: #fff;
    }
    .btn:hover {
      background: #4752c4;
    }
    .btn-primary {
      background: #00d4ff;
      color: #0a192f;
    }
    .btn-primary:hover {
      background: #00b8e6;
    }
    .btn-purple {
      background: #7b2fbe;
      color: #fff;
    }
    .btn-purple:hover {
      background: #6a26a5;
    }
    .footer {
      margin-top: 30px;
      color: #495670;
      font-size: 0.8rem;
    }
    .footer a {
      color: #00d4ff;
      text-decoration: none;
